name: Build Windows EXE (ONNX GPU)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: 1. 拉取代码
      uses: actions/checkout@v4
    
    - name: 2. 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 3. 安装极简依赖与 GPU 推理库
      run: |
        python -m pip install --upgrade pip
        pip install -r industrial_vision_app/requirements.txt
        
    - name: 4. 执行打包 (目录模式)
      run: |
        cd industrial_vision_app
        pyinstaller --noconsole --onedir --collect-all PySide6 --collect-all onnxruntime --collect-all onnxruntime-gpu main.py
        
    - name: 5. 压缩交付目录
      run: |
        cd industrial_vision_app/dist
        # 将 main 文件夹压缩成一个 zip，方便下载
        Compress-Archive -Path main -DestinationPath Industrial-Vision-ONNX-App.zip
        
    - name: 6. 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: Industrial-Vision-ONNX-App
        path: industrial_vision_app/dist/Industrial-Vision-ONNX-App.zip
